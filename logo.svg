  <rect x="13" y="18" width="5" height="20" rx="2.5" fill="url(#zcGold)"/>
  <rect x="23.5" y="13" width="5" height="30" rx="2.5" fill="url(#zcGold)"/>
  <rect x="34" y="18" width="5" height="20" rx="2.5" fill="url(#zcGold)"/>
  <text x="65" y="30" fill="#ffffff" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="600" letter-spacing="1.5">织川文化传媒</text>
  <text x="66" y="45" fill="#d9ad4f" font-family="Arial,sans-serif" font-size="9" font-weight="600" letter-spacing="3">ZHICHUAN MEDIA</text>
</svg>
