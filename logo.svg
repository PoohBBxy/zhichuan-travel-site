<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 56" role="img" aria-label="织川文化传媒 ZHICHUAN MEDIA">
  <defs>
    <linearGradient id="zcGold" x1="0" y1="6" x2="0" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0d27a"/>
      <stop offset="1" stop-color="#c6982f"/>
    </linearGradient>
  </defs>
  <!-- Geometric emblem: a thin gold frame holding three rising strokes (川) -->
